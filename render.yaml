services:
  # Backend API service
  - type: web
    name: lexguard-backend
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lexguard-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: true
      - key: UPLOAD_DIR
        value: /workspace/uploads

# PostgreSQL Database
databases:
  - name: lexguard-db
    plan: free
