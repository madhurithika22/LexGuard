services:
  # Backend API service
  - type: web
    name: lexguard-backend
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lexguard-db
          property: connectionString
      # Fix: Kept sync: false but removed the 'value' line entirely
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /workspace/uploads

# PostgreSQL Database
databases:
  - name: lexguard-db
    plan: free
