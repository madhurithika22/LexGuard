version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lexguard-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword2026
      POSTGRES_DB: lexguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lexguard-storage
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword2026
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexguard-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword2026@db:5432/lexguard
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - UPLOAD_DIR=/workspace/uploads
    depends_on:
      - db
      - minio
    volumes:
      - backend_uploads:/workspace/uploads

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: lexguard-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  backend_uploads:
